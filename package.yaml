name: markdown-processor
version: 0.1.0.0
synopsis: A command-line tool for processing and converting Markdown files
description: A command-line tool for processing and converting Markdown files, used by developers and writers to simplify their workflow
license: MIT
license-file: LICENSE
author: Your Name
maintainer: your@email.com
copyright: 2023 Your Name
category: Development
build-type: Simple
cabal-version: >= 1.10
extra-source-files:
- README.md
- ChangeLog.md
source-repository head
  type: git
  location: https://github.com/your-username/markdown-processor.git
library
  default-language: Haskell2010
  ghc-options: -Wall -Wno-safe -O2
  build-depends:
    - base >= 4.7 && < 5
    - scotty >= 0.11.6 && < 0.12
    - text >= 1.2.4 && < 2
    - pandoc >= 2.14.0 && < 3
    - pdf-toolkit >= 0.1.0 && < 0.2
    - directory >= 1.3.6 && < 2
    - filepath >= 1.4.2 && < 2
    - process >= 1.6.8 && < 2
  hs-source-dirs: src
  exposed-modules: Main
executable markdown-processor
  default-language: Haskell2010
  ghc-options: -Wall -Wno-safe -O2
  main-is: Main.hs
  build-depends:
    - base >= 4.7 && < 5
    - scotty >= 0.11.6 && < 0.12
    - text >= 1.2.4 && < 2
    - pandoc >= 2.14.0 && < 3
    - pdf-toolkit >= 0.1.0 && < 0.2
    - directory >= 1.3.6 && < 2
    - filepath >= 1.4.2 && < 2
    - process >= 1.6.8 && < 2
  hs-source-dirs: src